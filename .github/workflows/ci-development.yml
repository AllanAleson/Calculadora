name: CI - Development

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:

    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache de Dependencias
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('**/package-lock.json') }}

      - name: Instalar dependencias
        run: npm ci

      - name: Rodar lint
        run: npm run lint

  build:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      # 🔐 Login Docker
      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🐳 Build da imagem
      - name: Build da imagem Docker
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/app:${{ github.sha }} .

      # 📤 Push da imagem
      - name: Push da imagem
        run: docker push ${{ secrets.DOCKER_USERNAME }}/app:${{ github.sha }}

      # 📦 Gerar artefato (opcional)
      - name: Gerar artefato
        run: zip -r app.zip .

      - name: Publicar artefato
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: app.zip

  test:
    needs: build
    strategy:

        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Baixar artefato
        uses: actions/download-artifact@v4
        with:
          name: app-build

      - name: Extrair artefato
        shell: pwsh
        run: Expand-Archive -Path app.zip -DestinationPath . -Force

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache de Dependencias
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('**/package-lock.json') }}

      - name: Instalar dependencias
        run: npm ci

      - name: Rodar testes
        run: npm test

      - name: Run Coverage
        run: npm run coverage

      # 🐳 Teste dentro do container (extra)
      - name: Teste via Docker
        run: docker run --rm ${{ secrets.DOCKER_USERNAME }}/app:${{ github.sha }} npm test

  sonar:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Cache de Dependencias
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-24-${{ hashFiles('**/package-lock.json') }}

      - name: Instalar dependencias
        run: npm ci

      - name: Gerar coverage
        run: npm run coverage

      - name: Analise com SonarCloud
        uses: SonarSource/sonarcloud-github-action@v1
        with:
          args: >
            -Dsonar.projectKey=AllanAleson_aulapipiline2
            -Dsonar.organization=allanaleson
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}