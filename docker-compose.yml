services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: calculadora-mobile
    ports:
      - "19000:19000"
      - "19001:19001"
      - "8081:8081"
    environment:
      EXPO_NO_TELEMETRY: "1"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - /app/node_modules
    stdin_open: true
    tty: true
    command: npx expo start --non-interactive
